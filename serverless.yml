service: chatvexa-backend

provider:
  name: aws
  runtime: nodejs18.x
  stage: prod
  region: ap-south-1
  deploymentBucket:
    name: my-bot-serverless-deploy-302767540275
    blockPublicAccess: true

functions:
  api:
    handler: ./src/index.handler
    timeout: 60
    memorySize: 1024
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true